<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cake</title>
  <link rel="stylesheet" href="cake.css">
</head>
<body>

<audio id="bgMusic" loop>
  <source src="Murtaza Qizilbash - Tum - Official Audio.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <h1>Make a wish 🤍</h1>

  <div class="cake">
    <div id="candles" class="candles"></div>
    <div class="top"></div>
    <div class="middle"></div>
    <div class="bottom"></div>
  </div>

  <button id="wishBtn">Blow the candles</button>

  <p id="message">Happy 20th Birthday 🤍</p>
</div>

<script src="cake.js"></script>
</body>
</html>
