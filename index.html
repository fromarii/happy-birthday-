<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For my jaan ❤️</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- COVER PAGE -->
  <div class="cover">
    <div class="card tape">
      <h1>For my jaan ❤️</h1>
      <button id="openBtn">Open</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="page hidden"></div>

  <!-- BACKGROUND MUSIC -->
  <audio id="bgMusic" loop preload="auto">
    <source src="Murtaza Qizilbash  Tum  Official Audio.mp3" type="audio/mpeg">
  </audio>

  <!-- TEMPLATE USED BY SCRIPT -->
  <template id="cakeTemplate">

    <div class="cake-page">

      <h1>Make a wish 🤍</h1>

      <div class="cake">

        <div id="candles" class="candles"></div>

        <div class="top"></div>

        <div class="middle"></div>

        <div class="bottom"></div>

      </div>

      <button id="wishBtn">Blow the candles</button>

      <p id="message">Happy 20th Birthday 🤍</p>

    </div>

  </template>

  <script src="script.js"></script>

</body>
</html>
